<!DOCTYPE html>
<html dir="rtl" lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مائی بزنس - انوینٹری</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#fbbf24">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Manrope:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
    <style>
        body {
            font-family: 'Noto Nastaliq Urdu', serif;
            background-color: #0f172a;
        }
        .urdu-font {
            font-family: 'Noto Nastaliq Urdu', serif;
        }
        .english-font {
            font-family: 'Manrope', sans-serif;
        }
        .glass-effect {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        main {
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="text-slate-100 pb-24">

    <!-- Top Bar -->
    <header class="fixed top-0 inset-x-0 z-50 glass-effect p-4 flex justify-between items-center px-6">
        <div class="flex items-center gap-4">
            <a href="index.html" class="p-2 hover:bg-slate-800 rounded-full transition-all text-slate-400">
                <span class="material-symbols-outlined">arrow_forward</span>
            </a>
            <h1 id="store-name-display" class="text-xl font-bold text-white urdu-font">اسٹاک مینجمنٹ</h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="showCategoryModal()" class="bg-slate-800 text-amber-400 p-2 rounded-xl border border-slate-700 hover:bg-slate-700 transition-all flex items-center justify-center" title="کیٹیگریز">
                <span class="material-symbols-outlined">category</span>
            </button>
            <button onclick="showAddModal()" class="bg-amber-400 text-slate-900 p-2 rounded-xl shadow-lg shadow-amber-400/20 hover:scale-105 transition-transform flex items-center justify-center">
                <span class="material-symbols-outlined font-bold">add</span>
            </button>
        </div>
    </header>

    <main class="mt-24 px-4 space-y-6">
        
        <!-- Search & Scan Row -->
        <div class="flex gap-2">
            <div class="relative flex-grow">
                <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-500">search</span>
                <input type="text" id="inventory-search" oninput="renderInventory()" placeholder="نام یا نمبر تلاش کریں..." class="w-full pr-12 pl-4 py-3 bg-slate-800/50 text-white rounded-xl border border-slate-700/50 shadow-inner focus:ring-2 focus:ring-amber-400/50 text-sm outline-none urdu-font">
            </div>
            <button class="bg-slate-800 p-3 rounded-xl border border-slate-700/50 flex items-center justify-center text-slate-400 hover:bg-slate-700 transition-all">
                <span class="material-symbols-outlined">qr_code_scanner</span>
            </button>
        </div>

        <!-- Category Filter Pills -->
        <div id="category-pills" class="flex overflow-x-auto gap-2 no-scrollbar pb-2 urdu-font">
            <!-- Dynamic Category Pills -->
        </div>

        <!-- Inventory List -->
        <section id="inventory-list" class="space-y-4 urdu-font pb-12">
            <!-- Dynamic content -->
        </section>

    </main>

    <!-- Add/Edit Item Modal -->
    <div id="item-modal" class="fixed inset-0 z-[100] modal-bg hidden flex items-end sm:items-center justify-center p-4">
        <div class="bg-slate-900 w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-6 shadow-2xl border border-slate-800 animate-in slide-in-from-bottom duration-300">
            <div class="flex justify-between items-center mb-6 urdu-font">
                <h3 id="modal-title" class="text-lg font-bold text-white">نیا آئٹم شامل کریں</h3>
                <button onclick="hideItemModal()" class="text-slate-500 hover:text-white transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            
            <form id="item-form" class="space-y-4 urdu-font" onsubmit="saveItem(event)">
                <input type="hidden" id="edit-id">
                <div class="space-y-1">
                    <label class="text-[10px] text-slate-500 mr-2">آئٹم کا نام</label>
                    <input type="text" id="item-name" required placeholder="مثلاً: آئٹم کا نام..." class="w-full px-4 py-3 bg-slate-800/50 text-white rounded-xl border border-slate-700/30 text-xs outline-none focus:ring-2 focus:ring-amber-400/50">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] text-slate-500 mr-2">آئٹم نمبر</label>
                        <input type="text" id="item-id" required readonly placeholder="0" class="w-full px-4 py-3 bg-slate-800/50 text-slate-400 rounded-xl border border-slate-700/30 text-xs outline-none english-font cursor-not-allowed">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] text-slate-500 mr-2">کیٹیگری</label>
                        <select id="item-category" class="w-full px-4 py-3 bg-slate-800/50 text-white rounded-xl border border-slate-700/30 text-xs outline-none focus:ring-2 focus:ring-amber-400/50">
                            <!-- Categories will be injected here -->
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] text-slate-500 mr-2">خریداری (Rs.)</label>
                        <input type="number" id="item-cost-price" required placeholder="0" class="w-full px-4 py-3 bg-slate-800/50 text-white rounded-xl border border-slate-700/30 text-[10px] outline-none focus:ring-2 focus:ring-amber-400/50 english-font">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] text-slate-500 mr-2">فروخت (Rs.)</label>
                        <input type="number" id="item-price" required placeholder="0" class="w-full px-4 py-3 bg-slate-800/50 text-white rounded-xl border border-slate-700/30 text-[10px] outline-none focus:ring-2 focus:ring-amber-400/50 english-font">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] text-slate-500 mr-2">اسٹاک</label>
                        <input type="number" id="item-stock" required placeholder="0" class="w-full px-4 py-3 bg-slate-800/50 text-white rounded-xl border border-slate-700/30 text-[10px] outline-none focus:ring-2 focus:ring-amber-400/50 english-font">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-slate-500 mr-2">تصویر کا لنک (Image URL) یا کیمرہ</label>
                    <div class="flex gap-2">
                        <input type="text" id="item-image" placeholder="https://..." class="flex-grow px-4 py-3 bg-slate-800/50 text-white rounded-xl border border-slate-700/30 text-xs outline-none focus:ring-2 focus:ring-amber-400/50 english-font text-left" dir="ltr">
                        <button type="button" onclick="triggerImagePicker()" class="bg-slate-800 text-amber-400 p-3 rounded-xl border border-slate-700 hover:bg-slate-700 transition-all flex items-center justify-center">
                            <span class="material-symbols-outlined">photo_camera</span>
                        </button>
                    </div>
                    <input type="file" id="item-image-file" accept="image/*" capture="environment" class="hidden" onchange="handleImageSelection(event)">
                    
                    <!-- Image Preview Area -->
                    <div id="image-preview-container" class="mt-2 hidden group relative">
                        <img id="item-image-preview" src="" class="w-full h-32 object-cover rounded-xl border border-slate-700">
                        <button type="button" onclick="clearImagePreview()" class="absolute top-2 right-2 bg-slate-900/80 p-1 rounded-lg text-slate-400 hover:text-rose-400">
                            <span class="material-symbols-outlined text-sm">close</span>
                        </button>
                    </div>
                </div>
                
                <div class="flex items-center gap-2 pt-2">
                    <input type="checkbox" id="item-fragile" class="accent-amber-400">
                    <label for="item-fragile" class="text-xs text-slate-300">نازک آئٹم (Fragile)</label>
                </div>
                </div>

                <button type="submit" class="w-full bg-amber-400 text-slate-900 py-4 rounded-2xl font-bold mt-4 hover:scale-[1.02] transition-all">محفوظ کریں</button>
            </form>
        </div>
    </div>

    <!-- Category Management Modal -->
    <div id="category-modal" class="fixed inset-0 z-[100] modal-bg hidden flex items-end sm:items-center justify-center p-4">
        <div class="bg-slate-900 w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-6 shadow-2xl border border-slate-800 animate-in slide-in-from-bottom duration-300">
            <div class="flex justify-between items-center mb-6 urdu-font">
                <h3 class="text-lg font-bold text-white">کیٹیگریز مینجمنٹ</h3>
                <button onclick="hideCategoryModal()" class="text-slate-500 hover:text-white transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            
            <div class="space-y-4 urdu-font">
                <div class="flex gap-2">
                    <input type="text" id="new-cat-name" placeholder="نئی کیٹیگری..." class="flex-grow px-4 py-3 bg-slate-800/50 text-white rounded-xl border border-slate-700/30 text-xs outline-none focus:ring-2 focus:ring-amber-400/50">
                    <button onclick="addNewCategory()" class="bg-amber-400 text-slate-900 px-4 py-3 rounded-xl font-bold text-xs hover:bg-amber-500 transition-all">شامل کریں</button>
                </div>

                <div id="category-modal-list" class="max-h-[250px] overflow-y-auto space-y-2 no-scrollbar">
                    <!-- Categories will be listed here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 inset-x-0 h-20 bg-slate-900 border-t border-slate-800 flex justify-around items-center px-6 z-[60] rounded-t-3xl shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.5)] urdu-font">
        <a href="index.html" id="nav-dashboard" class="flex flex-col items-center gap-1 transition-colors text-slate-500">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="text-[8px] font-bold">ڈیش بورڈ</span>
        </a>
        <a href="inventory.html" id="nav-stock" class="flex flex-col items-center gap-1 transition-colors text-slate-500">
            <span class="material-symbols-outlined">inventory_2</span>
            <span class="text-[8px] font-bold">اسٹاک</span>
        </a>
        <a href="pos.html" id="nav-pos" class="flex flex-col items-center gap-1 transition-colors text-slate-500">
            <span class="material-symbols-outlined">shopping_cart</span>
            <span class="text-[8px] font-bold">سیلز</span>
        </a>
        <a href="reports.html" id="nav-reports" class="flex flex-col items-center gap-1 transition-colors text-slate-500">
            <span class="material-symbols-outlined">analytics</span>
            <span class="text-[8px] font-bold">رپورٹس</span>
        </a>
        <a href="expenses.html" id="nav-expenses" class="flex flex-col items-center gap-1 transition-colors text-slate-500">
            <span class="material-symbols-outlined">payments</span>
            <span class="text-[8px] font-bold">اخراجات</span>
        </a>
        <a href="khata.html" id="nav-khata" class="flex flex-col items-center gap-1 transition-colors text-slate-500">
            <span class="material-symbols-outlined">menu_book</span>
            <span class="text-[8px] font-bold">ادھار</span>
        </a>
    </nav>

    <script src="data.js"></script>
    <script src="sync.js"></script>
    <script src="ui.js"></script>
    <script>
        let currentCategory = 'All';

        function renderCategories() {
            const container = document.getElementById('category-pills');
            const categories = AppData.getCategories();
            const select = document.getElementById('item-category');
            
            // Render Pills
            let html = `<button onclick="filterCategory('All')" class="whitespace-nowrap px-6 py-2 rounded-full text-xs font-bold transition-all ${currentCategory === 'All' ? 'bg-amber-400 text-slate-900 shadow-md' : 'bg-slate-800 text-slate-400 border border-slate-700/50 hover:bg-slate-700/50'}">تمام اشیاء</button>`;
            
            categories.forEach(cat => {
                html += `<button onclick="filterCategory('${cat}')" class="whitespace-nowrap px-6 py-2 rounded-full text-xs font-bold transition-all ${currentCategory === cat ? 'bg-amber-400 text-slate-900 shadow-md' : 'bg-slate-800 text-slate-400 border border-slate-700/50 hover:bg-slate-700/50'}">${cat}</button>`;
            });
            
            container.innerHTML = html;

            // Render Select Options
            select.innerHTML = categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
        }

        function filterCategory(cat) {
            currentCategory = cat;
            renderCategories();
            renderInventory();
        }

        function renderInventory() {
            const el = document.getElementById('store-name-display');
            if (el) el.innerText = "اسٹاک مینجمنٹ";
            const inventory = AppData.getInventory();
            const list = document.getElementById('inventory-list');
            const query = document.getElementById('inventory-search').value.toLowerCase();
            
            const filtered = inventory.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(query) || item.id.toLowerCase().includes(query);
                const matchesCat = currentCategory === 'All' || item.category === currentCategory;
                return matchesSearch && matchesCat;
            });

            if (filtered.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-slate-600 urdu-font">کوئی آئٹم نہیں ملا...</div>`;
                return;
            }

            list.innerHTML = filtered.map(item => `
                <div class="bg-slate-800/40 p-4 rounded-2xl border ${item.stock <= 5 ? 'border-r-4 border-r-amber-400 border-slate-700/50' : 'border-slate-700/50'} flex items-center gap-4 hover:bg-slate-800/60 transition-all">
                    <div class="relative w-20 h-20 bg-slate-900 rounded-xl overflow-hidden shadow-inner flex-shrink-0 border border-slate-700">
                        <img src="${item.image || 'https://via.placeholder.com/150'}" alt="Item" class="w-full h-full object-cover grayscale-[0.2]">
                        ${item.fragile ? `
                            <div class="absolute top-1 right-1 bg-slate-900/80 p-1 rounded-md shadow-sm">
                                <span class="material-symbols-outlined text-rose-500 text-[10px]">warning</span>
                            </div>
                        ` : ''}
                    </div>
                    <div class="flex-grow">
                        <div class="flex items-center gap-2 mb-1">
                            <h4 class="font-bold text-sm text-slate-200">${item.name}</h4>
                            <span class="bg-slate-900 text-slate-500 text-[8px] px-2 py-0.5 rounded-full uppercase english-font border border-slate-700">${item.id}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs ${item.stock <= 5 ? 'text-amber-400 font-bold' : 'text-slate-500'}">اسٹاک: <span class="english-font font-bold">${item.stock}</span></span>
                            <div class="h-3 w-[1px] bg-slate-700"></div>
                            <span class="text-xs text-slate-500 font-urdu">قیمت: <span class="english-font font-bold text-emerald-400">Rs. ${item.price.toLocaleString()}</span></span>
                            ${item.costPrice ? `
                                <div class="h-3 w-[1px] bg-slate-700"></div>
                                <span class="text-[10px] text-slate-600 font-urdu">مارجن: <span class="english-font text-amber-500/80">${Math.round(((item.price - item.costPrice) / item.price) * 100)}%</span></span>
                            ` : ''}
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <button onclick="showEditModal('${item.id}')" class="p-2 hover:bg-slate-700 rounded-full text-slate-500 hover:text-amber-400 transition-all">
                            <span class="material-symbols-outlined text-lg">edit</span>
                        </button>
                        <button onclick="deleteItem('${item.id}')" class="p-2 hover:bg-slate-700 rounded-full text-slate-500 hover:text-rose-500 transition-all">
                            <span class="material-symbols-outlined text-lg">delete</span>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Modal Functions
        function showAddModal() {
            document.getElementById('modal-title').innerText = 'نیا آئٹم شامل کریں';
            document.getElementById('item-form').reset();
            document.getElementById('edit-id').value = '';
            
            // Auto-fill Item Number
            const nextId = AppData.getNextItemId();
            document.getElementById('item-id').value = nextId;
            
            clearImagePreview();
            document.getElementById('item-modal').classList.remove('hidden');
        }

        function showEditModal(id) {
            const item = AppData.getInventory().find(i => i.id === id);
            if (!item) return;

            document.getElementById('modal-title').innerText = 'آئٹم ایڈٹ کریں';
            document.getElementById('edit-id').value = item.id;
            document.getElementById('item-id').value = item.id;
            document.getElementById('item-id').disabled = true;
            document.getElementById('item-name').value = item.name;
            document.getElementById('item-category').value = item.category;
            document.getElementById('item-price').value = item.price;
            document.getElementById('item-cost-price').value = item.costPrice || '';
            document.getElementById('item-stock').value = item.stock;
            document.getElementById('item-image').value = item.image;
            document.getElementById('item-fragile').checked = item.fragile;
            
            if (item.image) {
                updateImagePreview(item.image);
            } else {
                clearImagePreview();
            }
            
            document.getElementById('item-modal').classList.remove('hidden');
        }

        // Image Handling Functions
        function triggerImagePicker() {
            document.getElementById('item-image-file').click();
        }

        function handleImageSelection(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    compressImage(img, (compressedBase64) => {
                        document.getElementById('item-image').value = compressedBase64;
                        updateImagePreview(compressedBase64);
                    });
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function compressImage(img, callback) {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800;
            const MAX_HEIGHT = 800;
            let width = img.width;
            let height = img.height;

            if (width > height) {
                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }
            } else {
                if (height > MAX_HEIGHT) {
                    width *= MAX_HEIGHT / height;
                    height = MAX_HEIGHT;
                }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            // Compress to JPEG with 0.7 quality
            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
            callback(dataUrl);
        }

        function updateImagePreview(src) {
            const container = document.getElementById('image-preview-container');
            const preview = document.getElementById('item-image-preview');
            preview.src = src;
            container.classList.remove('hidden');
        }

        function clearImagePreview() {
            const container = document.getElementById('image-preview-container');
            const preview = document.getElementById('item-image-preview');
            const fileInput = document.getElementById('item-image-file');
            preview.src = '';
            container.classList.add('hidden');
            fileInput.value = '';
        }

        function hideItemModal() {
            document.getElementById('item-modal').classList.add('hidden');
        }

        // Category Management Functions
        function showCategoryModal() {
            document.getElementById('category-modal').classList.remove('hidden');
            renderCategoryModalList();
        }

        function hideCategoryModal() {
            document.getElementById('category-modal').classList.add('hidden');
        }

        function renderCategoryModalList() {
            const list = document.getElementById('category-modal-list');
            const categories = AppData.getCategories();
            const inventory = AppData.getInventory();

            list.innerHTML = categories.map(cat => {
                const itemCount = inventory.filter(i => i.category === cat).length;
                return `
                    <div class="bg-slate-800/40 p-3 rounded-xl border border-slate-700/50 flex items-center justify-between">
                        <div>
                            <span class="text-white text-xs font-bold">${cat}</span>
                            <span class="text-[8px] text-slate-500 mr-2">(${itemCount} اشیاء)</span>
                        </div>
                        <button onclick="removeCategory('${cat}', ${itemCount})" class="p-1.5 hover:bg-rose-500/20 rounded-lg text-slate-500 hover:text-rose-400 transition-all">
                            <span class="material-symbols-outlined text-sm">delete</span>
                        </button>
                    </div>
                `;
            }).join('');
        }

        function addNewCategory() {
            const name = document.getElementById('new-cat-name').value;
            if (!name) return;
            AppData.addCategory(name);
            document.getElementById('new-cat-name').value = '';
            renderCategoryModalList();
            renderCategories();
        }

        function removeCategory(name, count) {
            if (count > 0) {
                alert('اس کیٹیگری میں اشیاء موجود ہیں۔ پہلے انہیں کسی دوسری کیٹیگری میں منتقل کریں!');
                return;
            }
            if (confirm(`کیا آپ "${name}" کیٹیگری ختم کرنا چاہتے ہیں؟`)) {
                AppData.deleteCategory(name);
                renderCategoryModalList();
                renderCategories();
            }
        }

        function saveItem(e) {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const itemData = {
                id: document.getElementById('item-id').value,
                name: document.getElementById('item-name').value,
                category: document.getElementById('item-category').value,
                price: parseFloat(document.getElementById('item-price').value),
                costPrice: parseFloat(document.getElementById('item-cost-price').value) || 0,
                stock: parseInt(document.getElementById('item-stock').value),
                image: document.getElementById('item-image').value || 'https://via.placeholder.com/150',
                fragile: document.getElementById('item-fragile').checked
            };

            if (editId) {
                AppData.updateInventory(itemData);
            } else {
                AppData.addInventory(itemData);
            }

            hideItemModal();
            renderInventory();
        }
        function deleteItem(id) {
            if (confirm("کیا آپ واقعی اس آئٹم کو اسٹاک سے ہٹانا چاہتے ہیں؟")) {
                AppData.deleteInventory(id);
                renderInventory();
                if (typeof UI !== 'undefined' && UI.showToast) {
                    UI.showToast("آئٹم کامیابی سے ہٹا دیا گیا!");
                }
            }
        }

        // Initialize

        const urlParams = new URLSearchParams(window.location.search);
        const catParam = urlParams.get('cat');
        const idParam = urlParams.get('id');

        if (catParam) {
            currentCategory = catParam;
        }
        if (idParam) {
            document.getElementById('inventory-search').value = idParam;
        }

        renderCategories();
        renderInventory();

        if (idParam) {
            // Scroll to top if needed or show a toast
            setTimeout(() => {
                const results = document.getElementById('inventory-list');
                if (results && results.children.length > 0) {
                    results.scrollIntoView({ behavior: 'smooth' });
                }
            }, 500);
        }

    </script>
</body>
</html>
